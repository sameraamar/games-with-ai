<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew & Arabic Games</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='0.9em' font-size='52'%3E%F0%9F%94%A4%3C/text%3E%3C/svg%3E">
    <style>
/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    overflow-x: hidden;
    color: #333;
}

body.rtl {
    direction: rtl;
}

/* ===== Top Bar ===== */
#topBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.top-btn {
    background: rgba(255, 255, 255, 0.25);
    border: none;
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 1.1rem;
    cursor: pointer;
    color: white;
    transition: all 0.3s;
}

.top-btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: scale(1.05);
}

.lang-toggle {
    font-weight: bold;
    min-width: 50px;
}

.star-display {
    display: flex;
    align-items: center;
    gap: 5px;
    color: white;
    font-size: 1.2rem;
    font-weight: bold;
}

.app-title {
    color: white;
    font-size: 1.3rem;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.hidden {
    display: none !important;
}

/* ===== Screens ===== */
.screen {
    display: none;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease;
}

.screen.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== Home Screen ===== */
.welcome-area {
    text-align: center;
    padding: 20px 0;
}

.mascot {
    font-size: 5rem;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.welcome-text {
    color: white;
    font-size: 1.8rem;
    margin: 10px 0;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

.subtitle {
    color: rgba(255, 255, 255, 0.85);
    font-size: 1.1rem;
}

.game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 25px;
    padding: 0 10px;
}

.game-card {
    border: none;
    border-radius: 20px;
    padding: 25px 15px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.game-card:active {
    transform: scale(0.95);
}

.card-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
.card-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
.card-green { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
.card-orange { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }

.game-icon {
    font-size: 3rem;
}

.game-label {
    font-size: 1.1rem;
    font-weight: bold;
}

/* ===== Alef-Bet Explorer ===== */
.letter-display {
    background: white;
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    margin-bottom: 20px;
}

.big-letter {
    font-size: 7rem;
    color: #7c3aed;
    line-height: 1.2;
    font-family: serif;
    transition: all 0.3s;
}

.big-letter:hover {
    transform: scale(1.1);
}

.letter-name {
    font-size: 1.5rem;
    color: #555;
    margin: 5px 0;
    font-weight: 600;
}

.arabic-equiv {
    font-size: 1.3rem;
    color: #888;
    margin-bottom: 15px;
}

.arabic-equiv .arabic-letter {
    font-size: 2.5rem;
    color: #ea580c;
}

.speak-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 30px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.speak-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
}

/* Pronunciation popup */
.pronun-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 20px;
    padding: 25px 35px;
    text-align: center;
    z-index: 1100;
    box-shadow: 0 15px 50px rgba(0,0,0,0.3);
    animation: popIn 0.3s;
}

.pronun-popup .pronun-text {
    font-size: 2.5rem;
    color: #7c3aed;
    margin-bottom: 5px;
}

.pronun-popup .pronun-hint {
    font-size: 1.3rem;
    color: #666;
    font-style: italic;
}

.pronun-popup .pronun-close {
    margin-top: 12px;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 8px 25px;
    font-size: 1rem;
    cursor: pointer;
}

.pronun-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 1099;
}

.bounce {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
}

.letter-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.nav-btn {
    background: white;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s;
    color: #7c3aed;
}

.nav-btn:hover {
    transform: scale(1.1);
    background: #7c3aed;
    color: white;
}

.progress-text {
    color: white;
    font-size: 1rem;
    font-weight: bold;
}

.letter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
    gap: 8px;
}

.letter-grid-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 10px;
    font-size: 1.5rem;
    cursor: pointer;
    color: white;
    transition: all 0.3s;
    text-align: center;
    font-family: serif;
}

.letter-grid-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(1.1);
}

.letter-grid-btn.active {
    background: white;
    color: #7c3aed;
    border-color: #7c3aed;
    font-weight: bold;
}

.letter-grid-btn.learned {
    background: rgba(34, 197, 94, 0.3);
    border-color: rgba(34, 197, 94, 0.5);
}

/* ===== Word Match ===== */
.category-selector {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 10px;
    margin-bottom: 15px;
}

.cat-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid transparent;
    border-radius: 50px;
    padding: 8px 18px;
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s;
}

.cat-btn:hover {
    background: rgba(255, 255, 255, 0.35);
}

.cat-btn.active {
    background: white;
    color: #2563eb;
    font-weight: bold;
}

.word-challenge {
    background: white;
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    margin-bottom: 20px;
}

.word-emoji {
    font-size: 5rem;
    margin-bottom: 10px;
}

.word-hebrew {
    font-size: 2.5rem;
    color: #2563eb;
    font-weight: bold;
    font-family: serif;
    margin-bottom: 10px;
}

.word-choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.choice-btn {
    background: white;
    border: 3px solid #e5e7eb;
    border-radius: 15px;
    padding: 15px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.choice-btn:hover {
    border-color: #3b82f6;
    transform: scale(1.03);
}

.choice-btn.correct {
    background: #dcfce7;
    border-color: #22c55e;
    animation: correctShake 0.5s;
}

.choice-btn.wrong {
    background: #fee2e2;
    border-color: #ef4444;
    animation: wrongShake 0.5s;
}

@keyframes correctShake {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.08); }
    50% { transform: scale(0.95); }
    75% { transform: scale(1.03); }
}

@keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}

.feedback {
    text-align: center;
    padding: 15px;
    border-radius: 15px;
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 10px;
}

.feedback.correct-fb {
    background: #dcfce7;
    color: #16a34a;
}

.feedback.wrong-fb {
    background: #fee2e2;
    color: #ef4444;
}

.game-progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
}

.progress-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transition: all 0.3s;
}

.progress-dot.done {
    background: #22c55e;
}

.progress-dot.current {
    background: white;
    transform: scale(1.3);
}

/* ===== Memory Game ===== */
.memory-header {
    text-align: center;
    color: white;
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 15px;
}

.memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 500px;
    margin: 0 auto;
}

.memory-card {
    aspect-ratio: 1;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
    transform-style: preserve-3d;
}

.memory-card.flipped {
    transform: rotateY(180deg);
}

.memory-card.matched {
    opacity: 0.7;
    pointer-events: none;
}

.memory-card .card-face {
    position: absolute;
    inset: 0;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    font-size: 1.5rem;
    font-weight: bold;
}

.memory-card .card-front {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-size: 2rem;
}

.memory-card .card-back {
    background: white;
    transform: rotateY(180deg);
    color: #333;
    font-family: serif;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    flex-direction: column;
    gap: 2px;
    padding: 5px;
    text-align: center;
}

.memory-card .card-back .mem-emoji {
    font-size: 2rem;
}

.memory-card .card-back .mem-text {
    font-size: 1rem;
    font-family: serif;
}

/* ===== Numbers ===== */
.number-display {
    background: white;
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    margin-bottom: 20px;
}

.big-number {
    font-size: 5rem;
    color: #ea580c;
    font-weight: bold;
}

.number-hebrew {
    font-size: 2.2rem;
    color: #7c3aed;
    font-family: serif;
    margin: 5px 0;
}

.number-arabic-word {
    font-size: 1.4rem;
    color: #888;
    margin-bottom: 15px;
}

.number-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.number-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.number-grid-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid transparent;
    border-radius: 15px;
    padding: 15px 10px;
    font-size: 1.5rem;
    cursor: pointer;
    color: white;
    transition: all 0.3s;
    text-align: center;
    font-weight: bold;
}

.number-grid-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(1.05);
}

.number-grid-btn.active {
    background: white;
    color: #ea580c;
    border-color: #ea580c;
}

/* ===== Celebration ===== */
.celebration {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s;
}

.celebration-content {
    background: white;
    border-radius: 30px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.5s;
}

@keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

.celebration-emoji {
    font-size: 5rem;
    animation: bounce 1s infinite;
}

.celebration-content h2 {
    font-size: 1.8rem;
    color: #7c3aed;
    margin: 15px 0;
}

.stars-earned {
    font-size: 2.5rem;
    margin: 10px 0 20px;
}

.play-btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 35px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
}

/* ===== Confetti ===== */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1001;
    animation: confettiFall 1.5s ease-out forwards;
}

@keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* ===== Responsive ===== */
@media (max-width: 500px) {
    .game-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .big-letter {
        font-size: 5rem;
    }

    .word-emoji {
        font-size: 3.5rem;
    }

    .memory-grid {
        grid-template-columns: repeat(3, 1fr);
    }

    .game-card {
        padding: 18px 10px;
    }

    .game-icon {
        font-size: 2.5rem;
    }

    .app-title {
        font-size: 1rem;
    }

    .letter-grid {
        grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
    }
}

/* ===== Direction Toggle ===== */
.direction-toggle {
    display: flex;
    justify-content: center;
    margin-top: 15px;
}

.dir-btn {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 50px;
    padding: 10px 22px;
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.dir-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(1.05);
}

.dir-btn .dir-arrow {
    font-size: 1.3rem;
}
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header id="topBar">
        <button id="btnBack" class="top-btn hidden" onclick="app.goHome()">
            <span class="icon">🏠</span>
        </button>
        <div id="starCount" class="star-display">
            <span class="icon">⭐</span>
            <span id="stars">0</span>
        </div>
        <h1 id="appTitle" class="app-title" data-i18n="appTitle"></h1>
        <button id="btnLang" class="top-btn lang-toggle" onclick="app.toggleLang()">
            <span id="langLabel">EN</span>
        </button>
    </header>

    <!-- Home Screen -->
    <section id="homeScreen" class="screen active">
        <div class="welcome-area">
            <div class="mascot">🦊</div>
            <h2 data-i18n="welcome" class="welcome-text"></h2>
            <p data-i18n="chooseGame" class="subtitle"></p>
        </div>
        <div class="direction-toggle">
            <button class="dir-btn" onclick="app.toggleDirection()">
                <span id="dirLabel" data-i18n="dirLabel"></span>
                <span class="dir-arrow">🔄</span>
            </button>
        </div>
        <div class="game-grid">
            <button class="game-card card-purple" onclick="app.startGame('alefbet')">
                <span class="game-icon">🔤</span>
                <span class="game-label" data-i18n="alefBet"></span>
            </button>
            <button class="game-card card-blue" onclick="app.startGame('wordmatch')">
                <span class="game-icon">🖼️</span>
                <span class="game-label" data-i18n="wordMatch"></span>
            </button>
            <button class="game-card card-green" onclick="app.startGame('memory')">
                <span class="game-icon">🃏</span>
                <span class="game-label" data-i18n="memoryGame"></span>
            </button>
            <button class="game-card card-orange" onclick="app.startGame('numbers')">
                <span class="game-icon">🔢</span>
                <span class="game-label" data-i18n="numbers"></span>
            </button>
        </div>
    </section>

    <!-- Alef-Bet Explorer -->
    <section id="alefbetScreen" class="screen">
        <div class="letter-display">
            <div id="hebrewLetter" class="big-letter"></div>
            <div id="letterName" class="letter-name"></div>
            <div id="arabicEquiv" class="arabic-equiv"></div>
            <button class="speak-btn bounce" onclick="app.speakLetter()">
                <span>🔊</span> <span data-i18n="listen"></span>
            </button>
        </div>
        <div class="letter-nav">
            <button class="nav-btn" onclick="app.prevLetter()">◀</button>
            <span id="letterProgress" class="progress-text"></span>
            <button class="nav-btn" onclick="app.nextLetter()">▶</button>
        </div>
        <div id="letterGrid" class="letter-grid"></div>
    </section>

    <!-- Word Match Game -->
    <section id="wordmatchScreen" class="screen">
        <div class="category-selector" id="categoryBar"></div>
        <div class="word-challenge">
            <div id="wordEmoji" class="word-emoji"></div>
            <div id="wordHebrew" class="word-hebrew"></div>
            <button class="speak-btn" onclick="app.speakWord()">
                <span>🔊</span>
            </button>
        </div>
        <div id="wordChoices" class="word-choices"></div>
        <div id="wordFeedback" class="feedback hidden"></div>
        <div id="wordProgress" class="game-progress"></div>
    </section>

    <!-- Memory Game -->
    <section id="memoryScreen" class="screen">
        <div class="memory-header">
            <span data-i18n="moves"></span>: <span id="moveCount">0</span>
            &nbsp;|&nbsp;
            <span data-i18n="pairs"></span>: <span id="pairCount">0</span>/<span id="totalPairs">0</span>
        </div>
        <div id="memoryGrid" class="memory-grid"></div>
    </section>

    <!-- Numbers Game -->
    <section id="numbersScreen" class="screen">
        <div class="number-display">
            <div id="numberShow" class="big-number"></div>
            <div id="numberHebrew" class="number-hebrew"></div>
            <div id="numberArabic" class="number-arabic-word"></div>
            <button class="speak-btn bounce" onclick="app.speakNumber()">
                <span>🔊</span> <span data-i18n="listen"></span>
            </button>
        </div>
        <div class="number-nav">
            <button class="nav-btn" onclick="app.prevNumber()">◀</button>
            <span id="numberProgress" class="progress-text"></span>
            <button class="nav-btn" onclick="app.nextNumber()">▶</button>
        </div>
        <div id="numberGrid" class="number-grid"></div>
    </section>

    <!-- Celebration Overlay -->
    <div id="celebration" class="celebration hidden">
        <div class="celebration-content">
            <div class="celebration-emoji">🎉</div>
            <h2 id="celebrationText" data-i18n="greatJob"></h2>
            <div class="stars-earned">⭐⭐⭐</div>
            <button class="play-btn" onclick="app.closeCelebration()" data-i18n="continue"></button>
        </div>
    </div>

    <script>
// ===== Internationalization (Arabic / English) =====
const I18N = {
    en: {
        appTitle: "Hebrew & Arabic Games",
        welcome: "Hello Friend! 👋",
        chooseGame: "Choose a game to play!",

const APP_STORAGE_KEY = "languageGamesProgress";
const LEGACY_STORAGE_KEY = "learnHebrew";

// ===== Learn Hebrew App =====
const app = {
    lang: "ar",
    direction: "learnHebrew", // "learnHebrew" or "learnArabic"
    stars: 0,
    currentLetterIdx: 0,
    currentNumberIdx: 0,
    currentCategory: "animals",
    currentWordIdx: 0,
    wordOrder: [],
    memoryCards: [],
    memoryFlipped: [],
    memoryMatched: [],
    memoryMoves: 0,
    learnedLetters: new Set(),
    learnedNumbers: new Set(),
    celebrationAction: null,

    init() {
        this._loadVoices();
        this.loadProgress();
        this.applyLang();
        this.updateStars();
        this.updateDirectionLabel();
    },

    toggleDirection() {
        this.direction = this.direction === "learnHebrew" ? "learnArabic" : "learnHebrew";
        this.updateDirectionLabel();
        this.saveProgress();
    },

    updateDirectionLabel() {
        const key = this.direction === "learnHebrew" ? "dirLearnHebrew" : "dirLearnArabic";
        const el = document.getElementById("dirLabel");
        if (el) el.textContent = I18N[this.lang][key];
    },

    toggleLang() {
        const cycle = ["ar", "en", "he"];
        const idx = cycle.indexOf(this.lang);
        this.lang = cycle[(idx + 1) % cycle.length];
        this.applyLang();
    },

    applyLang() {
        const strings = I18N[this.lang];
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (strings[key]) {
                el.textContent = strings[key];
            }
        });
        const nextLangLabels = { ar: "EN", en: "עב", he: "عر" };
        document.getElementById("langLabel").textContent = nextLangLabels[this.lang];
        this.updateDirectionLabel();
        if (this.lang === "ar" || this.lang === "he") {
            document.body.classList.add("rtl");
        } else {
            document.body.classList.remove("rtl");
        }
    },

    showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id + "Screen").classList.add("active");
        document.getElementById("btnBack").classList.toggle("hidden", id === "home");
    },

    goHome() {
        this.showScreen("home");
    },

    startGame(game) {
        switch (game) {
            case "alefbet":
                this.showScreen("alefbet");
                this.renderAlefBet();
                break;
            case "wordmatch":
                this.showScreen("wordmatch");
                this.initWordMatch();
                break;
            case "memory":
                this.showScreen("memory");
                this.initMemoryGame();
                break;
            case "numbers":
                this.showScreen("numbers");
                this.renderNumbers();
                break;
        }
    },

    addStars(count) {
        this.stars += count;
        this.updateStars();
        this.saveProgress();
    },

    updateStars() {
        document.getElementById("stars").textContent = this.stars;
    },

    saveProgress() {
        const data = {
            stars: this.stars,
            learnedLetters: [...this.learnedLetters],
            learnedNumbers: [...this.learnedNumbers],
            direction: this.direction,
        };
        try {
            localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(data));
        } catch (e) { /* ignore */ }
    },

    loadProgress() {
        try {
            const rawData = localStorage.getItem(APP_STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
            const data = rawData ? JSON.parse(rawData) : null;
            if (data) {
                this.stars = data.stars || 0;
                this.learnedLetters = new Set(data.learnedLetters || []);
                this.learnedNumbers = new Set(data.learnedNumbers || []);
                if (data.direction) this.direction = data.direction;
            }
        } catch (e) { /* ignore */ }
    },

    speak(text, lang, transliteration, options = {}) {
        const showPronunciationFallback = options.showPronunciationFallback !== false;
        if (!("speechSynthesis" in window)) {
            if (showPronunciationFallback) {
                this._showPronunciation(text, transliteration);
            }
            return;
        }
        window.speechSynthesis.cancel();

        const doSpeak = () => {
            const voices = window.speechSynthesis.getVoices();
            const baseLang = (lang || "he-IL").split("-")[0];

            // Try exact match, then prefix match, then any variant
            const voice = voices.find(v => v.lang === lang) ||
                          voices.find(v => v.lang.startsWith(baseLang + "-")) ||
                          voices.find(v => v.lang.startsWith(baseLang));

            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.75;
            utter.pitch = 1.1;

            if (voice) {
                utter.voice = voice;
                utter.lang = voice.lang;
            } else {
                utter.lang = lang || "he-IL";
            }

            // If speech fails or no voice found, show pronunciation
            let spoke = false;
            utter.onstart = () => { spoke = true; };
            utter.onerror = () => {
                if (!spoke && showPronunciationFallback) {
                    this._showPronunciation(text, transliteration);
                }
            };

            window.speechSynthesis.speak(utter);

            // Fallback: if nothing happens after 500ms, show pronunciation
            if (!voice && showPronunciationFallback) {
                setTimeout(() => {
                    if (!spoke) this._showPronunciation(text, transliteration);
                }, 500);
            }
        };

        // If voices not loaded yet, wait for them
        if (window.speechSynthesis.getVoices().length === 0) {
            window.speechSynthesis.onvoiceschanged = () => doSpeak();
            // Also try after a short delay (some browsers don't fire the event)
            setTimeout(doSpeak, 300);
        } else {
            doSpeak();
        }
    },

    _showPronunciation(text, transliteration) {
        // Remove any existing popup
        document.querySelectorAll(".pronun-popup, .pronun-overlay").forEach(e => e.remove());
        if (!transliteration) return;

        const overlay = document.createElement("div");
        overlay.className = "pronun-overlay";
        overlay.onclick = () => { overlay.remove(); popup.remove(); };

        const popup = document.createElement("div");
        popup.className = "pronun-popup";
        popup.innerHTML =
            '<div class="pronun-text">' + this.escapeHtml(text) + '</div>' +
            '<div class="pronun-hint">🗣️ ' + this.escapeHtml(transliteration) + '</div>' +
            '<button class="pronun-close" onclick="this.parentElement.remove();document.querySelector(\'.pronun-overlay\').remove()">' +
            (I18N[this.lang].continue || 'OK') + '</button>';

        document.body.appendChild(overlay);
        document.body.appendChild(popup);
    },

    // Preload voices (Chrome loads them async)
    _loadVoices() {
        if ("speechSynthesis" in window) {
            window.speechSynthesis.getVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }
        }
    },

    spawnConfetti() {
        const colors = ["#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff", "#a855f7", "#ff922b"];
        for (let i = 0; i < 30; i++) {
            const el = document.createElement("div");
            el.className = "confetti";
            el.style.left = Math.random() * 100 + "vw";
            el.style.top = "-10px";
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (Math.random() * 8 + 6) + "px";
            el.style.height = el.style.width;
            el.style.animationDuration = (Math.random() * 1 + 1) + "s";
            el.style.animationDelay = (Math.random() * 0.5) + "s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }
    },

    showCelebration(onClose) {
        this.celebrationAction = typeof onClose === "function" ? onClose : null;
        document.getElementById("celebration").classList.remove("hidden");
        this.applyLang();
        this.spawnConfetti();
    },

    closeCelebration() {
        document.getElementById("celebration").classList.add("hidden");
        const action = this.celebrationAction;
        this.celebrationAction = null;
        if (action) {
            action();
        }
    },

    // ===== ALEF-BET EXPLORER =====
    renderAlefBet() {
        const letter = ALEF_BET[this.currentLetterIdx];
        const isHebrew = this.direction === "learnHebrew";

        // Big letter = the one we're learning
        document.getElementById("hebrewLetter").textContent = isHebrew ? letter.he : letter.ar;
        document.getElementById("letterName").textContent = letter.name + " / " + letter.nameAr;

        const equivLabel = isHebrew ? I18N[this.lang].arabicLetter : I18N[this.lang].hebrewLetter;
        const equivChar = isHebrew ? letter.ar : letter.he;
        document.getElementById("arabicEquiv").innerHTML =
            equivLabel + ": <span class='arabic-letter'>" + this.escapeHtml(equivChar) + "</span>";

        document.getElementById("letterProgress").textContent =
            (this.currentLetterIdx + 1) + " / " + ALEF_BET.length;

        const grid = document.getElementById("letterGrid");
        grid.innerHTML = "";
        ALEF_BET.forEach((l, i) => {
            const btn = document.createElement("button");
            btn.className = "letter-grid-btn";
            if (i === this.currentLetterIdx) btn.classList.add("active");
            if (this.learnedLetters.has(i)) btn.classList.add("learned");
            btn.textContent = isHebrew ? l.he : l.ar;
            btn.onclick = () => {
                this.currentLetterIdx = i;
                this.renderAlefBet();
            };
            grid.appendChild(btn);
        });
    },

    speakLetter() {
        const letter = ALEF_BET[this.currentLetterIdx];
        const isHebrew = this.direction === "learnHebrew";
        const text = isHebrew ? letter.he : letter.ar;
        const lang = isHebrew ? "he-IL" : "ar-SA";
        const trlit = isHebrew ? letter.trHe : letter.trAr;
        this.speak(text, lang, trlit);
        if (!this.learnedLetters.has(this.currentLetterIdx)) {
            this.learnedLetters.add(this.currentLetterIdx);
            this.addStars(1);
        }
        this.renderAlefBet();
    },

    prevLetter() {
        this.currentLetterIdx = (this.currentLetterIdx - 1 + ALEF_BET.length) % ALEF_BET.length;
        this.renderAlefBet();
    },

    nextLetter() {
        this.currentLetterIdx = (this.currentLetterIdx + 1) % ALEF_BET.length;
        this.renderAlefBet();
    },

    // ===== WORD MATCH GAME =====
    initWordMatch() {
        this.currentWordIdx = 0;
        this.renderCategoryBar();
        this.shuffleWords();
        this.renderWordChallenge();
    },

    renderCategoryBar() {
        const bar = document.getElementById("categoryBar");
        bar.innerHTML = "";
        Object.keys(VOCABULARY).forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-btn" + (cat === this.currentCategory ? " active" : "");
            btn.textContent = I18N[this.lang]["category_" + cat] || cat;
            btn.onclick = () => {
                this.currentCategory = cat;
                this.currentWordIdx = 0;
                this.shuffleWords();
                this.renderCategoryBar();
                this.renderWordChallenge();
            };
            bar.appendChild(btn);
        });
    },

    shuffleWords() {
        const words = VOCABULARY[this.currentCategory];
        this.wordOrder = [...Array(words.length).keys()];
        for (let i = this.wordOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [this.wordOrder[i], this.wordOrder[j]] = [this.wordOrder[j], this.wordOrder[i]];
        }
    },

    renderWordChallenge() {
        const words = VOCABULARY[this.currentCategory];
        if (this.currentWordIdx >= words.length) {
            this.addStars(3);
            this.currentWordIdx = 0;
            this.shuffleWords();
            this.showCelebration(() => this.renderWordChallenge());
            return;
        }

        const idx = this.wordOrder[this.currentWordIdx];
        const word = words[idx];

        const isHebrew = this.direction === "learnHebrew";

        document.getElementById("wordEmoji").textContent = word.emoji;
        // Show the word in the language we're learning
        document.getElementById("wordHebrew").textContent = isHebrew ? word.he : word.ar;

        const fb = document.getElementById("wordFeedback");
        fb.classList.add("hidden");
        fb.classList.remove("correct-fb", "wrong-fb");

        // Answers are in the "other" language
        // learnHebrew → answers in ar/en/he(fallback en)
        // learnArabic → answers in he/en
        let answerLang;
        if (isHebrew) {
            answerLang = this.lang === "ar" ? "ar" : this.lang === "he" ? "en" : "en";
        } else {
            answerLang = this.lang === "he" ? "he" : this.lang === "ar" ? "he" : "en";
        }
        const correctLabel = word[answerLang];
        let wrongChoices = [];
        const allWords = Object.values(VOCABULARY).flat();
        while (wrongChoices.length < 3) {
            const rw = allWords[Math.floor(Math.random() * allWords.length)];
            if (rw[answerLang] !== correctLabel && !wrongChoices.includes(rw[answerLang])) {
                wrongChoices.push(rw[answerLang]);
            }
        }

        let choices = [correctLabel, ...wrongChoices];
        for (let i = choices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [choices[i], choices[j]] = [choices[j], choices[i]];
        }

        const container = document.getElementById("wordChoices");
        container.innerHTML = "";
        choices.forEach(c => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.textContent = c;
            btn.onclick = () => this.checkWordAnswer(btn, c, correctLabel);
            container.appendChild(btn);
        });

        this.renderWordProgress(words.length);
    },

    checkWordAnswer(btn, selected, correct) {
        const fb = document.getElementById("wordFeedback");
        fb.classList.remove("hidden", "correct-fb", "wrong-fb");

        if (selected === correct) {
            btn.classList.add("correct");
            fb.classList.add("correct-fb");
            fb.textContent = I18N[this.lang].correct;
            this.addStars(1);
            const spokenWord = VOCABULARY[this.currentCategory][this.wordOrder[this.currentWordIdx]];
            const isHeb = this.direction === "learnHebrew";
            const trlit = isHeb ? spokenWord.tr : (spokenWord.trAr || spokenWord.en);
            this.speak(isHeb ? spokenWord.he : spokenWord.ar, isHeb ? "he-IL" : "ar-SA", trlit, {
                showPronunciationFallback: false,
            });
            document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
            setTimeout(() => {
                this.currentWordIdx++;
                this.renderWordChallenge();
            }, 1500);
        } else {
            btn.classList.add("wrong");
            fb.classList.add("wrong-fb");
            fb.textContent = I18N[this.lang].tryAgain;
        }
    },

    speakWord() {
        const words = VOCABULARY[this.currentCategory];
        const idx = this.wordOrder[this.currentWordIdx];
        if (words[idx]) {
            const isHeb = this.direction === "learnHebrew";
            const w = words[idx];
            const trlit = isHeb ? w.tr : (w.trAr || w.en);
            this.speak(isHeb ? w.he : w.ar, isHeb ? "he-IL" : "ar-SA", trlit);
        }
    },

    renderWordProgress(total) {
        const container = document.getElementById("wordProgress");
        container.innerHTML = "";
        for (let i = 0; i < total; i++) {
            const dot = document.createElement("div");
            dot.className = "progress-dot";
            if (i < this.currentWordIdx) dot.classList.add("done");
            if (i === this.currentWordIdx) dot.classList.add("current");
            container.appendChild(dot);
        }
    },

    // ===== MEMORY GAME =====
    initMemoryGame() {
        this.memoryMoves = 0;
        this.memoryFlipped = [];
        this.memoryMatched = [];
        document.getElementById("moveCount").textContent = "0";

        const allWords = Object.values(VOCABULARY).flat();
        const shuffled = [...allWords].sort(() => Math.random() - 0.5);
        const picks = shuffled.slice(0, 6);

        document.getElementById("totalPairs").textContent = picks.length;
        document.getElementById("pairCount").textContent = "0";

        this.memoryCards = [];
        const isHebrew = this.direction === "learnHebrew";
        picks.forEach((word, i) => {
            this.memoryCards.push({ id: i, type: "emoji", content: word.emoji, pairId: i });
            this.memoryCards.push({ id: i, type: "text", content: isHebrew ? word.he : word.ar, pairId: i, word: word });
        });

        for (let i = this.memoryCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [this.memoryCards[i], this.memoryCards[j]] = [this.memoryCards[j], this.memoryCards[i]];
        }

        this.renderMemoryGrid();
    },

    renderMemoryGrid() {
        const grid = document.getElementById("memoryGrid");
        grid.innerHTML = "";

        this.memoryCards.forEach((card, i) => {
            const el = document.createElement("div");
            el.className = "memory-card";
            if (this.memoryMatched.includes(card.pairId)) el.classList.add("matched", "flipped");

            el.innerHTML =
                '<div class="card-face card-front">❓</div>' +
                '<div class="card-face card-back">' +
                (card.type === "emoji"
                    ? '<span class="mem-emoji">' + this.escapeHtml(card.content) + '</span>'
                    : '<span class="mem-text">' + this.escapeHtml(card.content) + '</span>') +
                '</div>';

            el.onclick = () => this.flipMemoryCard(i, el);
            grid.appendChild(el);
        });
    },

    flipMemoryCard(index, el) {
        if (el.classList.contains("flipped") || el.classList.contains("matched")) return;
        if (this.memoryFlipped.length >= 2) return;

        el.classList.add("flipped");
        this.memoryFlipped.push({ index, el, card: this.memoryCards[index] });

        if (this.memoryFlipped.length === 2) {
            this.memoryMoves++;
            document.getElementById("moveCount").textContent = this.memoryMoves;

            const [a, b] = this.memoryFlipped;

            if (a.card.pairId === b.card.pairId) {
                this.memoryMatched.push(a.card.pairId);
                document.getElementById("pairCount").textContent = this.memoryMatched.length;
                a.el.classList.add("matched");
                b.el.classList.add("matched");
                this.memoryFlipped = [];
                this.addStars(1);

                const wordCard = a.card.word ? a.card : b.card;
                if (wordCard.word) {
                    const isHeb = this.direction === "learnHebrew";
                    const w = wordCard.word;
                    const trlit = isHeb ? w.tr : (w.trAr || w.en);
                    this.speak(isHeb ? w.he : w.ar, isHeb ? "he-IL" : "ar-SA", trlit, {
                        showPronunciationFallback: false,
                    });
                }

                if (this.memoryMatched.length === this.memoryCards.length / 2) {
                    setTimeout(() => {
                        this.addStars(3);
                        this.showCelebration(() => this.initMemoryGame());
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    a.el.classList.remove("flipped");
                    b.el.classList.remove("flipped");
                    this.memoryFlipped = [];
                }, 800);
            }
        }
    },

    // ===== NUMBERS =====
    renderNumbers() {
        const n = NUMBERS[this.currentNumberIdx];
        const isHebrew = this.direction === "learnHebrew";
        document.getElementById("numberShow").textContent = n.num;
        // Primary = language being learned, secondary = known language
        document.getElementById("numberHebrew").textContent = isHebrew
            ? n.he + " (" + n.tr + ")"
            : n.ar;
        document.getElementById("numberArabic").textContent = isHebrew
            ? n.ar
            : n.he + " (" + n.tr + ")";

        document.getElementById("numberProgress").textContent =
            (this.currentNumberIdx + 1) + " / " + NUMBERS.length;

        const grid = document.getElementById("numberGrid");
        grid.innerHTML = "";
        NUMBERS.forEach((num, i) => {
            const btn = document.createElement("button");
            btn.className = "number-grid-btn";
            if (i === this.currentNumberIdx) btn.classList.add("active");
            btn.textContent = num.num;
            btn.onclick = () => {
                this.currentNumberIdx = i;
                this.renderNumbers();
            };
            grid.appendChild(btn);
        });
    },

    speakNumber() {
        const n = NUMBERS[this.currentNumberIdx];
        const isHebrew = this.direction === "learnHebrew";
        const trlit = isHebrew ? n.tr : n.trAr;
        this.speak(isHebrew ? n.he : n.ar, isHebrew ? "he-IL" : "ar-SA", trlit);
        if (!this.learnedNumbers.has(this.currentNumberIdx)) {
            this.learnedNumbers.add(this.currentNumberIdx);
            this.addStars(1);
        }
    },

    prevNumber() {
        this.currentNumberIdx = (this.currentNumberIdx - 1 + NUMBERS.length) % NUMBERS.length;
        this.renderNumbers();
    },

    nextNumber() {
        this.currentNumberIdx = (this.currentNumberIdx + 1) % NUMBERS.length;
        this.renderNumbers();
    },

    escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    },
};

document.addEventListener("DOMContentLoaded", () => app.init());
    </script>
